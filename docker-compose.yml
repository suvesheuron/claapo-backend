# CrewCall Backend — Local PostgreSQL database
# Usage:
#   docker compose up -d        # start the database in background
#   docker compose ps           # check status / health
#   docker compose logs -f db   # tail logs
#   docker compose down         # stop (data is preserved in the named volume)
#   docker compose down -v      # stop AND wipe the data volume
#
# After the container is healthy, run Prisma against it:
#   npm run prisma:migrate
#   npm run prisma:seed

services:
  db:
    image: postgres:16-alpine
    container_name: claapo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-claapo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claapo_password}
      POSTGRES_DB: ${POSTGRES_DB:-claapo}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - claapo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-claapo} -d ${POSTGRES_DB:-claapo}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: claapo-redis
    restart: unless-stopped
    # noeviction is BullMQ's hard requirement — losing a job key to LRU would
    # silently lose work. AppCacheService.wrap() degrades to the loader on
    # SETEX failure, so cache writes failing under OOM is benign. Bumped
    # maxmemory to 512 MB to give cache + queues comfortable headroom.
    command:
      [
        "redis-server",
        "--appendonly", "yes",
        "--maxmemory", "512mb",
        "--maxmemory-policy", "noeviction"
      ]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - claapo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  claapo_pgdata:
    name: claapo_pgdata
  claapo_redisdata:
    name: claapo_redisdata
